		<script>

			function sideMenu()
			{
				var x = document.getElementById("myHeader");
				if (x.className === "header")
				{
					x.className += " responsive";
					var a = document.getElementById("menuIcon");
					a.innerHTML = "menu_open";
				}
				else
				{
					x.className = "header";
					var a = document.getElementById("menuIcon");
					a.innerHTML = "menu";
				}
			}


			function toggleFilters()
			{
				var filterBTNs = document.getElementsByClassName('filterBTN');

				if (filterBTNs[0].style.opacity == 1)
				{
					for (var i = 0; i < filterBTNs.length; i ++) {
    					filterBTNs[i].style.opacity = '0%';
					}
					for (var i = 0; i < filterBTNs.length; i ++) {
    					filterBTNs[i].style.display = 'none';
					}
					document.getElementById('doubleArrowIcon').innerHTML = 'double_arrow';
				}
				else
				{
					for (var i = 0; i < filterBTNs.length; i ++) {
    					filterBTNs[i].style.display = 'inline-block';
					}
					for (var i = 0; i < filterBTNs.length; i ++) {
    					filterBTNs[i].style.opacity = '100%';
					}
					document.getElementById('doubleArrowIcon').innerHTML = 'close';
				}
			}

			function showGroups(n)
			{
				switch (n)
				{
					case "all":
						var all = document.getElementsByClassName("object");
						for (var i = 0; i < all.length; i ++)
						{
    						all[i].style.display = "inline";
						}
						break;
					case "robotics":
						var all = document.getElementsByClassName("object");
						for (var i = 0; i < all.length; i ++)
						{
    						all[i].style.display = "none";
						}
						var robotics = document.getElementsByClassName("robotics");
						for (var i = 0; i < robotics.length; i ++)
						{
    						robotics[i].style.display = "inline";
						}
						break;
					case "photography":
						var all = document.getElementsByClassName("object");
						for (var i = 0; i < all.length; i ++)
						{
    						all[i].style.display = "none";
						}
						var photography = document.getElementsByClassName("photography");
						for (var i = 0; i < photography.length; i ++)
						{
    						photography[i].style.display = "inline";
						}
						break;
					case "vases":
						var all = document.getElementsByClassName("object");
						for (var i = 0; i < all.length; i ++)
						{
    						all[i].style.display = "none";
						}
						var vases = document.getElementsByClassName("vases");
						for (var i = 0; i < vases.length; i ++)
						{
    						vases[i].style.display = "inline";
						}
						break;
				}
			}
